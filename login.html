<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Seguro - CAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-color: #05c46b;
            --accent-color: #0fbcf9;
            --dark-bg: #1e272e;
            --card-bg: rgba(45, 52, 54, 0.95);
        }

        body { 
            background: linear-gradient(-45deg, #1e272e, #2d3436, #05c46b, #1e272e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); 
            position: relative;
            overflow: hidden;
        }

        /* Detalhe luminoso no topo */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }

        .brand-logo {
            font-size: 3rem;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 10px;
        }

        h2 { color: white; text-align: center; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 5px; }
        .subtitle { color: #a4b0be; text-align: center; font-size: 0.85rem; margin-bottom: 30px; text-transform: uppercase; font-weight: 600; }

        .input-group-text {
            background: #2f3640;
            border: 1px solid #485460;
            color: #dcdde1;
        }

        .form-control { 
            background: #2f3640; 
            border: 1px solid #485460; 
            color: white; 
            padding: 12px;
            transition: 0.3s;
        }

        .form-control:focus { 
            background: #353b48; 
            border-color: var(--primary-color); 
            color: white; 
            box-shadow: 0 0 15px rgba(5, 196, 107, 0.2); 
        }

        .btn-entrar { 
            background: var(--primary-color); 
            color: #1e272e; 
            border: none; 
            width: 100%; 
            padding: 14px; 
            font-weight: 800; 
            margin-top: 20px; 
            transition: 0.4s; 
            border-radius: 12px;
            text-transform: uppercase;
        }

        .btn-entrar:hover:not(:disabled) { 
            background: #049f58; 
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(5, 196, 107, 0.3);
        }

        .btn-entrar:disabled {
            background: #485460;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .error-container {
            background: rgba(235, 59, 90, 0.1);
            border-left: 4px solid #eb3b5a;
            padding: 10px;
            margin-top: 15px;
            display: none;
            border-radius: 4px;
        }

        .error-msg { color: #ff7675; font-size: 0.85rem; margin: 0; font-weight: 600; }

        .footer-text {
            color: #747d8c;
            text-align: center;
            font-size: 0.75rem;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h2>REDE DE PROTEÇÃO</h2>
        <div class="subtitle">Painel de Atendimento CAS</div>

        <form id="formLogin">
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                <input type="text" id="user" class="form-control" placeholder="Usuário Técnico" required autocomplete="off">
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                <input type="password" id="pass" class="form-control" placeholder="Senha de Acesso" required>
            </div>

            <button type="submit" id="btnSubmit" class="btn-entrar">
                <span id="btnText">ENTRAR NO SISTEMA</span>
            </button>

            <div id="errorContainer" class="error-container">
                <p id="error" class="error-msg">⚠️ Acesso negado. Credenciais inválidas.</p>
            </div>
        </form>

        <div class="footer-text">
            Sessão monitorada para fins de segurança.
        </div>
    </div>

    <script>
        let attempts = 0;
        const maxAttempts = 5;

        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const u = document.getElementById('user').value.trim();
            const s = document.getElementById('pass').value.trim();
            const errorContainer = document.getElementById('errorContainer');
            const btnSubmit = document.getElementById('btnSubmit');
            const btnText = document.getElementById('btnText');

            // Simulação de carregamento (melhora UX)
            btnSubmit.disabled = true;
            btnText.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Validando...`;

            setTimeout(() => {
                if(u === "cas" && s === "vilajardim") {
                    sessionStorage.setItem('logado_bv', 'true');
                    sessionStorage.setItem('last_login', new Date().getTime());
                    window.location.href = "index.html"; 
                } else {
                    attempts++;
                    errorContainer.style.display = 'block';
                    document.getElementById('pass').value = "";
                    btnSubmit.disabled = false;
                    btnText.innerText = "ENTRAR NO SISTEMA";

                    if(attempts >= maxAttempts) {
                        blockSystem();
                    }
                }
            }, 800);
        });

        function blockSystem() {
            const btnSubmit = document.getElementById('btnSubmit');
            const btnText = document.getElementById('btnText');
            let timeLeft = 30;

            btnSubmit.disabled = true;
            
            const timer = setInterval(() => {
                btnText.innerText = `BLOQUEADO (${timeLeft}s)`;
                timeLeft--;

                if(timeLeft < 0) {
                    clearInterval(timer);
                    attempts = 0;
                    btnSubmit.disabled = false;
                    btnText.innerText = "ENTRAR NO SISTEMA";
                }
            }, 1000);
        }
    </script>
</body>
</html>
