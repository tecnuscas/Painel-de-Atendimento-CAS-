<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL DE ATENDIMENTO (CAS)</title>
    
    <script>
        if (sessionStorage.getItem('logado_bv') !== 'true') {
            window.location.href = "login.html";
        }
    </script>

    <style>
        :root {
            --primary: #05c46b;
            --primary-glow: rgba(5, 196, 107, 0.3);
            --bg-dark: #1e272e;
            --sidebar-bg: #161d23;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f1f2f6;
            --text-dim: #a4b0be;
            --accent-blue: #0fbcf9;
            --danger: #eb3b5a;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; background-color: var(--bg-dark); 
            display: flex; 
        }
        
        /* Barra Lateral Refinada */
        .sidebar {
            width: 300px; background: var(--sidebar-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; flex-direction: column; padding: 25px 15px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.4);
            overflow-y: auto; z-index: 10;
        }

        .sidebar-header {
            text-align: center; margin-bottom: 30px;
            padding-bottom: 20px; border-bottom: 1px dashed rgba(255,255,255,0.1);
        }

        .sidebar-header h1 { 
            font-size: 13px; color: var(--primary); text-transform: uppercase; 
            letter-spacing: 2px; margin: 0; font-weight: 900;
        }

        /* Menu de Navegação */
        .nav-group { margin-bottom: 20px; }
        .nav-label { 
            font-size: 9px; color: var(--text-dim); text-transform: uppercase; 
            margin-left: 10px; margin-bottom: 8px; letter-spacing: 1px;
        }

        .nav-item {
            display: flex; margin-bottom: 6px; gap: 2px;
            transition: transform 0.2s;
        }
        .nav-item:hover { transform: translateX(5px); }

        .btn-nav {
            flex: 1; background: var(--card-bg); color: var(--text-main); 
            border: none; padding: 12px 15px; cursor: pointer; border-radius: 8px 0 0 8px; 
            font-size: 11px; font-weight: 600; transition: 0.3s; 
            text-align: left; display: flex; align-items: center; gap: 12px;
        }

        .btn-pop {
            background: rgba(255,255,255,0.08); color: var(--text-dim); border: none;
            padding: 0 12px; cursor: pointer; border-radius: 0 8px 8px 0;
            transition: 0.3s; font-size: 14px;
        }

        /* Estados Ativos e Hover */
        .nav-item.active .btn-nav { 
            background: var(--primary); color: #000; 
            box-shadow: 0 0 15px var(--primary-glow);
        }
        .btn-nav:hover, .btn-pop:hover { background: var(--primary); color: #000; }

        .btn-form { border-left: 4px solid var(--primary); }
        .btn-sheet { border-left: 4px solid var(--accent-blue); }

        /* Rodapé da Sidebar */
        .btn-sair { 
            background: rgba(235, 59, 90, 0.1); color: var(--danger); 
            border: 1px solid var(--danger); padding: 12px; 
            border-radius: 8px; font-size: 11px; font-weight: 800; 
            cursor: pointer; margin-top: auto; transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-sair:hover { background: var(--danger); color: white; }

        /* Área de Conteúdo */
        .wrapper { flex: 1; display: flex; flex-direction: column; background: #000; }
        #content-frame { flex: 1; border: none; background: #f1f2f6; }

        /* Rodapé Institucional */
        .footer-brand {
            background: #ffffff; color: #2d3436; padding: 15px;
            font-size: 10px; text-align: center; border-top: 3px solid var(--primary);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }
        .footer-brand strong { color: #000; display: block; margin-bottom: 2px; }

        /* Scrollbar Custom */
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
            .btn-pop { display: none; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>Painel de Atendimento (CAS)</h1>
        </div>
        
        <div class="nav-group">
            <div class="nav-label">Territórios</div>
            <div class="nav-item active">
                <button class="btn-nav" onclick="carregar('vila-jardim.html', this.parentElement)">🏘️ Mapa Vila Jardim</button>
                <button class="btn-pop" onclick="abrirNova('vila-jardim.html')" title="Tela Cheia">↗</button>
            </div>
            <div class="nav-item">
                <button class="btn-nav" onclick="carregar('cidade-satelite.html', this.parentElement)">🛰️ Mapa Cidade Satélite</button>
                <button class="btn-pop" onclick="abrirNova('cidade-satelite.html')">↗</button>
            </div>
        </div>

        <div class="nav-group">
            <div class="nav-label">Sistemas 2026</div>
            <div class="nav-item">
                <button class="btn-nav btn-form" onclick="carregar('https://docs.google.com/forms/d/e/1FAIpQLSez0haWDLb9rjfvoaWWt0kuMg08qwKx7LLhhyRhzDOojVVxpg/viewform?embedded=true', this.parentElement)">📝 Formulário de Inscrição</button>
                <button class="btn-pop" onclick="abrirNova('https://docs.google.com/forms/d/e/1FAIpQLSez0haWDLb9rjfvoaWWt0kuMg08qwKx7LLhhyRhzDOojVVxpg/viewform')">↗</button>
            </div>
            <div class="nav-item">
                <button class="btn-nav btn-sheet" onclick="carregar('https://docs.google.com/spreadsheets/d/1bHXEpfJYvxkxgH1m584YorvgnGVrd1j4vYhPLuBW3AM/edit?rm=minimal', this.parentElement)">📊 Planilha de Matrículas</button>
                <button class="btn-pop" onclick="abrirNova('https://docs.google.com/spreadsheets/d/1bHXEpfJYvxkxgH1m584YorvgnGVrd1j4vYhPLuBW3AM/edit')">↗</button>
            </div>
        </div>

        <div class="nav-group">
            <div class="nav-label">Rede de Proteção</div>
            <div class="nav-item"><button class="btn-nav" onclick="carregar('cras.html', this.parentElement)">🏢 Mapa CRAS</button><button class="btn-pop" onclick="abrirNova('cras.html')">↗</button></div>
            <div class="nav-item"><button class="btn-nav" onclick="carregar('creas.html', this.parentElement)">🏢 Mapa CREAS</button><button class="btn-pop" onclick="abrirNova('creas.html')">↗</button></div>
            <div class="nav-item"><button class="btn-nav" onclick="carregar('conselho-tutelar.html', this.parentElement)">🛡️ Mapa Conselho Tutelar</button><button class="btn-pop" onclick="abrirNova('conselho-tutelar.html')">↗</button></div>
            <div class="nav-item"><button class="btn-nav" onclick="carregar('defensoria.html', this.parentElement)">⚖️ Mapa Defensoria</button><button class="btn-pop" onclick="abrirNova('defensoria.html')">↗</button></div>
            <div class="nav-item"><button class="btn-nav" onclick="carregar('raps.html', this.parentElement)">🧠 Mapa RAPS</button><button class="btn-pop" onclick="abrirNova('raps.html')">↗</button></div>
            <div class="nav-item"><button class="btn-nav" onclick="carregar('ficha-atendimento.html', this.parentElement)">📄 Atendimento Individual</button><button class="btn-pop" onclick="abrirNova('ficha-atendimento.html')">↗</button></div>
        </div>
        
        <button class="btn-sair" onclick="logout()">Sair do Sistema</button>
    </aside>

    <div class="wrapper">
        <iframe id="content-frame" src="vila-jardim.html"></iframe>

        <footer class="footer-brand">
            <strong>SECRETARIA DE ESTADO DO TRABALHO E BEM-ESTAR SOCIAL - SETRABES</strong>
            Avenida Mário Homem de Melo, nº 2310, Mecejana | Boa Vista - RR | CEP: 69304-350<br>
            Contato Institucional: gabinetesetrabes@gmail.com
        </footer>
    </div>

    <script>
        function carregar(url, elemento) {
            const frame = document.getElementById('content-frame');
            frame.style.opacity = '0.5';
            setTimeout(() => {
                frame.src = url;
                frame.style.opacity = '1';
            }, 150);
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            elemento.classList.add('active');
        }

        function abrirNova(url) {
            window.open(url, '_blank');
        }

        function logout() {
            if(confirm("Deseja realmente encerrar a sessão de trabalho?")) {
                sessionStorage.clear();
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
