<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA CAS 2026 - SETRABES</title>
    
    <script>
        if (sessionStorage.getItem('logado_bv') !== 'true') {
            window.location.href = "login.html";
        }
    </script>

    <style>
        :root {
            --primary: #05c46b;
            --primary-dark: #04a359;
            --bg-dark: #1e272e;
            --sidebar-bg: #2d3436;
            --text-light: #f1f2f6;
            --accent: #0fbcf9;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Inter', 'Segoe UI', sans-serif; overflow: hidden; 
            background-color: var(--bg-dark); display: flex; 
        }
        
        /* Barra Lateral */
        .sidebar-left {
            width: 280px; background: var(--sidebar-bg);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; padding: 20px 15px;
            gap: 8px; box-shadow: 10px 0 30px rgba(0,0,0,0.3);
            overflow-y: auto; z-index: 1000;
        }

        .sidebar-left h1 { 
            font-size: 12px; color: var(--primary); text-transform: uppercase; 
            letter-spacing: 2px; margin-bottom: 25px; text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;
        }

        /* Container do Botão (Menu + Nova Janela) */
        .nav-item {
            display: flex; gap: 4px; align-items: stretch;
        }

        .btn-nav {
            flex: 1; background: rgba(255,255,255,0.05); color: var(--text-light); 
            border: none; padding: 12px 15px; cursor: pointer; border-radius: 8px 0 0 8px; 
            font-size: 11px; font-weight: 600; transition: 0.3s; 
            text-transform: uppercase; text-align: left; display: flex; align-items: center; gap: 10px;
        }

        .btn-pop {
            background: rgba(255,255,255,0.1); color: var(--text-light); border: none;
            padding: 0 12px; cursor: pointer; border-radius: 0 8px 8px 0;
            transition: 0.3s; display: flex; align-items: center; font-size: 14px;
        }

        .btn-nav:hover, .btn-pop:hover { background: var(--primary); color: var(--bg-dark); }
        .nav-item.active .btn-nav { background: var(--primary); color: var(--bg-dark); }
        
        /* Destaques */
        .btn-form { border-left: 4px solid var(--primary); }
        .btn-sheet { border-left: 4px solid var(--accent); }

        .btn-sair { 
            background: #eb3b5a; color: white; border: none; padding: 14px; 
            border-radius: 8px; font-size: 11px; font-weight: 800; 
            cursor: pointer; margin-top: auto; transition: 0.3s;
        }
        .btn-sair:hover { background: #ff4d4d; transform: scale(1.02); }

        /* Área Principal */
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100vh; }
        #content-frame { flex: 1; border: none; background: #dfe6e9; }

        /* Rodapé */
        .setrabes-footer {
            background: white; color: #636e72; padding: 12px;
            font-size: 10px; text-align: center; border-top: 1px solid #d63031;
        }
        .setrabes-footer b { color: #2d3436; }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar-left { width: 100%; height: auto; flex-direction: row; flex-wrap: wrap; }
            .btn-pop { display: none; } /* Esconde popups no mobile para simplificar */
        }
    </style>
</head>
<body>

    <nav class="sidebar-left">
        <h1>Gestão CAS 2026</h1>
        
        <div class="nav-item active">
            <button class="btn-nav" onclick="carregar('vila-jardim.html', this.parentElement)">🏘️ Mapa Vila Jardim</button>
            <button class="btn-pop" onclick="abrirNova('vila-jardim.html')" title="Abrir em nova aba">↗</button>
        </div>

        <div class="nav-item">
            <button class="btn-nav" onclick="carregar('cidade-satelite.html', this.parentElement)">🛰️ Mapa Cidade Satélite</button>
            <button class="btn-pop" onclick="abrirNova('cidade-satelite.html')">↗</button>
        </div>

        <div class="nav-item">
            <button class="btn-nav btn-form" onclick="carregar('https://docs.google.com/forms/d/e/1FAIpQLSez0haWDLb9rjfvoaWWt0kuMg08qwKx7LLhhyRhzDOojVVxpg/viewform?embedded=true', this.parentElement)">📝 Inscrição (CAS 2026)</button>
            <button class="btn-pop" onclick="abrirNova('https://docs.google.com/forms/d/e/1FAIpQLSez0haWDLb9rjfvoaWWt0kuMg08qwKx7LLhhyRhzDOojVVxpg/viewform')">↗</button>
        </div>

        <div class="nav-item">
            <button class="btn-nav btn-sheet" onclick="carregar('https://docs.google.com/spreadsheets/d/1bHXEpfJYvxkxgH1m584YorvgnGVrd1j4vYhPLuBW3AM/edit?rm=minimal', this.parentElement)">📊 Matrículados 2026</button>
            <button class="btn-pop" onclick="abrirNova('https://docs.google.com/spreadsheets/d/1bHXEpfJYvxkxgH1m584YorvgnGVrd1j4vYhPLuBW3AM/edit')">↗</button>
        </div>

        <div class="nav-item"><button class="btn-nav" onclick="carregar('cras.html', this.parentElement)">🏢 Mapa CRAS</button><button class="btn-pop" onclick="abrirNova('cras.html')">↗</button></div>
        <div class="nav-item"><button class="btn-nav" onclick="carregar('creas.html', this.parentElement)">🏢 Mapa CREAS</button><button class="btn-pop" onclick="abrirNova('creas.html')">↗</button></div>
        <div class="nav-item"><button class="btn-nav" onclick="carregar('conselho-tutelar.html', this.parentElement)">🛡️ Mapa Conselho Tutelar</button><button class="btn-pop" onclick="abrirNova('conselho-tutelar.html')">↗</button></div>
        <div class="nav-item"><button class="btn-nav" onclick="carregar('defensoria.html', this.parentElement)">⚖️ Mapa Defensoria</button><button class="btn-pop" onclick="abrirNova('defensoria.html')">↗</button></div>
        <div class="nav-item"><button class="btn-nav" onclick="carregar('raps.html', this.parentElement)">🧠 Mapa RAPS</button><button class="btn-pop" onclick="abrirNova('raps.html')">↗</button></div>
        <div class="nav-item"><button class="btn-nav" onclick="carregar('ficha-atendimento.html', this.parentElement)">📄 Atendimento Individual</button><button class="btn-pop" onclick="abrirNova('ficha-atendimento.html')">↗</button></div>
        
        <button class="btn-sair" onclick="logout()">ENCERRAR SESSÃO</button>
    </nav>

    <main class="main-content">
        <iframe id="content-frame" src="vila-jardim.html"></iframe>

        <footer class="setrabes-footer">
            <b>SECRETARIA DE ESTADO DO TRABALHO E BEM-ESTAR SOCIAL</b><br>
            Avenida Mário Homem de Melo, nº 2310, Mecejana | Boa Vista - Roraima – Brasil - CEP: 69304-350<br>
            Contato: gabinetesetrabes@gmail.com
        </footer>
    </main>

    <script>
        function carregar(url, elemento) {
            const frame = document.getElementById('content-frame');
            frame.src = url;
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            elemento.classList.add('active');
        }

        function abrirNova(url) {
            window.open(url, '_blank');
        }

        function logout() {
            if(confirm("Deseja sair do sistema?")) {
                sessionStorage.clear();
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
